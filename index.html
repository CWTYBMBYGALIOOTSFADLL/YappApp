<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yappapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-bg: radial-gradient(circle at 0% 0%, #22242e 0.01%, #18181B 20%);
      --darker-bg: #181818;
      --text-color: #D4D4D4;
      --hover-color: #f3f3f3;
      --hover-color2: #ffffff;
      --button-bg: #18181b;
      --border: #2b2b31;
      --golden: #a3b3ff;
      --grayout-bg: #555759;
      --radius-sm: 10px; 
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto Mono', monospace;
      font-weight: 300; 
    }

    body {
      background: var(--dark-bg);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: flex;
    }

    /* Login Screen */
    #login-screen {
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background-color: var(--darker-bg);
      padding: 40px;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
      width: 100%;
      max-width: 400px;
      border: 1.5px solid var(--border);
    }

    .login-box h1 {
      color: var(--golden);
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .login-box p {
      color: var(--grayout-bg);
      font-weight: 400;
    }

    .login-box input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      outline: none;
      background: var(--dark-bg);
      color: var(--text-color);
      transition: border-color 0.2s;
    }
    
    .login-box input:focus {
      border-color: var(--golden);
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background-color: var(--golden);
      color: var(--darker-bg); 
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .login-box button:hover {
      opacity: 0.9;
    }
    
    .login-box button:active {
      transform: scale(0.98);
    }

    /* Chat Interface */
    #chat-screen {
      display: none;
      max-width: 1200px;
      height: 90vh;
      margin: auto;
      background-color: var(--darker-bg);
      border-radius: var(--radius-sm);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      overflow: hidden;
      border: 1.5px solid var(--border);
    }

    #chat-screen.active {
      display: flex;
    }

    .sidebar {
      width: 280px;
      border-right: 1.5px solid var(--border);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      background-color: var(--darker-bg);
    }

    .sidebar h2 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: var(--golden);
      font-weight: 500;
    }

    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--grayout-bg);
      margin: 24px 0 12px 0;
      letter-spacing: 1.2px;
      font-weight: 500;
    }

    .channel {
      padding: 12px 15px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 400;
      color: var(--grayout-bg);
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }

    .channel:hover {
      background-color: var(--button-bg);
      color: var(--hover-color);
    }

    .channel.active {
      background-color: var(--button-bg);
      color: var(--golden);
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--dark-bg);
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1.5px solid var(--border);
      background-color: var(--darker-bg);
    }
    
    .chat-header h2 {
      font-size: 1.2rem;
      font-weight: 500;
    }

    .message-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      overflow-y: auto;
      background-color: var(--dark-bg); 
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message.yours {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message .sender {
      font-size: 0.8rem;
      color: var(--grayout-bg);
      margin-bottom: 6px;
      font-weight: 400;
      margin-left: 4px;
    }
    
    .message.yours .sender {
      margin-left: 0;
      margin-right: 4px;
    }

    .message .bubble {
      padding: 14px 18px;
      background-color: var(--darker-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-color);
      line-height: 1.5;
      font-size: 0.95rem;
      font-weight: 400;
    }

    .message.yours .bubble {
      background-color: var(--golden);
      color: var(--darker-bg); 
      border: none;
    }

    .message-form {
      padding: 20px 24px;
      border-top: 1.5px solid var(--border);
      display: flex;
      gap: 12px;
      background-color: var(--darker-bg);
      border-radius: 10px 10px 0px 0px; 
    }

    .message-form input {
      flex: 1;
      padding: 16px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 400;
      outline: none;
      background: var(--dark-bg);
      color: var(--text-color);
      transition: border-color 0.2s;
    }
    
    .message-form input:focus {
      border-color: var(--golden);
    }

    .message-form button {
      padding: 0 28px;
      background-color: var(--golden);
      color: var(--darker-bg); 
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    
    .message-form button:hover {
      opacity: 0.9;
    }
    
    .message-form button:active {
      transform: scale(0.95);
    }

    /* Loader Container */
    .loader-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
      position: relative;
    }

    /* Uiverse Spinner */
    .spinner {
      width: 3em;
      height: 3em;
      cursor: not-allowed;
      border-radius: 50%;
      border: 2px solid var(--border);
      box-shadow: 
        -10px -10px 10px var(--golden), 
        0px -10px 10px 0px var(--text-color), 
        10px -10px 10px var(--grayout-bg), 
        10px 0 10px var(--border), 
        10px 10px 10px 0px var(--button-bg), 
        0 10px 10px 0px var(--darker-bg), 
        -10px 10px 10px 0px var(--golden); 
      animation: rot55 0.7s linear infinite;
    }

    .spinnerin {
      width: 1.5em;
      height: 1.5em;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes rot55 {
      to { transform: rotate(360deg); }
    }

    .spinner-logo {
      position: absolute;
      width: 1.2em;
      height: 1.2em;
      border-radius: 50%;
      object-fit: cover;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="login-screen" class="screen active">
    <div class="login-box">
      <h1>yappapp</h1>
      <p>enter a username to start yapping :3</p>
      
      <input type="text" id="username-input" placeholder="username...">
      
      <button id="login-btn">join Chat</button>
    </div>
  </div>

  <div id="chat-screen" class="screen">
    <aside class="sidebar">
      <div class="channel-list" id="global-list">
        <div class="channel global-channel active" data-channel="general">@general</div>
        <div class="channel global-channel" data-channel="coding">@coding</div>
        <div class="channel global-channel" data-channel="gaming">@gaming</div>
      </div>
      
      <h3>direct messages</h3>
      <div class="user-list" id="user-list">
        </div>
    </aside>

    <main class="chat-area">
      <header class="chat-header">
        <h2 id="current-chat-title">@general</h2>
      </header>
      
      <div class="message-container" id="messages">
        </div>

      <form class="message-form" id="message-form">
        <input type="text" id="message-input" placeholder="type a message..." autocomplete="off" required>
        <button type="submit" id="send-btn">send</button>
      </form>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
